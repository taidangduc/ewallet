name: EWallet CD (Frontend)

on:
  workflow_dispatch:
    inputs:
       environment:
        description: The environment to deploy to
        required: true
        type: environment

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    env:
      VERCEL_ENV: ${{ inputs.environment == 'production' && 'production' || 'development' }}
      VERCEL_PROD: ${{ inputs.environment == 'production' && '--prod' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Clients/customer/package-lock.json

      - name: Install Dependencies
        working-directory: src/Clients/customer
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Project Settings
        run: |
          vercel pull --yes --environment=$VERCEL_ENV --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project
        run: |
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project
        run: |
          vercel deploy --prebuilt $VERCEL_PROD --token=${{ secrets.VERCEL_TOKEN }}
